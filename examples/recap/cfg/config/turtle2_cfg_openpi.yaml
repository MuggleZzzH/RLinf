# XSquare X1 (Turtle2) Robot - CFG Training Configuration
# Adaptation Step: Step 4

defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/sft/config/

cluster:
  num_nodes: 1  # Single machine with 8 GPUs
  component_placement:
    actor,env,rollout: 0-3

runner:
  task_type: sft
  logger:
    log_path: "logs/cfg_sft"
    project_name: "rlinf-turtle2-recap"
    experiment_name: "turtle2_cfg_openpi"
    logger_backends: ["wandb"]
    # wandb_entity: "striding-algo"  # Uncomment if needed

  max_epochs: 30000
  save_interval: 2000
  val_check_interval: -1

data:
  # Tag from Step 3: loads meta/advantages_{tag}.parquet
  advantage_tag: "turtle2_v1_N10_q30"
  
  # Balance sampling weights across the 7 datasets
  balance_dataset_weights: true
  num_workers: 8
  seed: 42

  train_data_paths:
    - dataset_path: /mnt/public/songsiqi/data/lerobot/beijing_guqiuyi_20260317_pm_tele_s2m
      type: sft
    - dataset_path: /mnt/public/songsiqi/data/lerobot/beijing_guqiuyi_20260318_pm_tele_s2m
      type: sft
    - dataset_path: /mnt/public/songsiqi/data/lerobot/beijing_guqiuyi_20260410_pm_tele_s2m
      type: sft
    - dataset_path: /mnt/public/songsiqi/data/lerobot/beijing_guqiuyi_20260420_pm_tele_s2m
      type: sft
    - dataset_path: /mnt/public/songsiqi/data/lerobot/beijing_guqiuyi_20260325_pm_rollout_s2m
      type: rollout
    - dataset_path: /mnt/public/songsiqi/data/lerobot/beijing_guqiuyi_20260330_pm_rollout_s2m
      type: rollout
    - dataset_path: /mnt/public/songsiqi/data/lerobot/beijing_guqiuyi_20260407_pm_rollout_s2m
      type: rollout

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  # 8 GPUs * 16 micro_batch_size = 128 global_batch_size per grad step
  micro_batch_size: 16
  global_batch_size: 128
  
  model:
    precision: null
    model_path: "/mnt/public/songsiqi/data/import_checkpoint/fold_towel_gqy_03170318_s2s_a30/29999/29999"
    model_type: "cfg_model"
    openpi:
      config_name: "pi0_turtle2_x2robot_s2m"
      robot_type: "turtle2"
      cfgrl_guidance_scale: 1.0
      unconditional_prob: 0.1
      positive_only_conditional: true
      guidance_type: "positive"

  optim:
    lr: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1.0e-10
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: 1000
    total_training_steps: 30000
    min_lr: 0.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
