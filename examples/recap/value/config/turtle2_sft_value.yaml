# XSquare X1 (Turtle2) Robot - Value Model SFT configuration
# Adaptation Step: Step 2
# Usage: bash examples/recap/value/run_value_sft.sh turtle2_sft_value

defaults:
  - model/value@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/sft/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 4-7

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: "rlinf-turtle2-recap"
    experiment_name: "turtle2_value_sft"
    logger_backends: ["wandb"]

  max_epochs: 30000
  max_steps: -1
  val_check_interval: 500
  save_interval: 3000

data:
  # Must match Step 1's data.tag; loads meta/returns_{tag}.parquet
  tag: "turtle2_v1"

  train_data_paths:
    # --- 1. Expert Demonstrations (SFT Type) ---
    - dataset_path: beijing_guqiuyi_20260317_pm_tele_s2m
      type: sft
      robot_type: "turtle2"
      model_type: "pi0"
    - dataset_path: beijing_guqiuyi_20260318_pm_tele_s2m
      type: sft
      robot_type: "turtle2"
      model_type: "pi0"
    - dataset_path: beijing_guqiuyi_20260410_pm_tele_s2m
      type: sft
      robot_type: "turtle2"
      model_type: "pi0"
    - dataset_path: beijing_guqiuyi_20260420_pm_tele_s2m
      type: sft
      robot_type: "turtle2"
      model_type: "pi0"

    # --- 2. Real-world Rollouts (Rollout Type) ---
    - dataset_path: beijing_guqiuyi_20260325_pm_rollout_s2m
      type: rollout
      robot_type: "turtle2"
      model_type: "pi0"
    - dataset_path: beijing_guqiuyi_20260330_pm_rollout_s2m
      type: rollout
      robot_type: "turtle2"
      model_type: "pi0"
    - dataset_path: beijing_guqiuyi_20260407_pm_rollout_s2m
      type: rollout
      robot_type: "turtle2"
      model_type: "pi0"

  eval_data_paths:
    - dataset_path: beijing_guqiuyi_20260407_pm_rollout_s2m
      max_samples: 5000
      robot_type: "turtle2"
      model_type: "pi0"

  # ----- dataloader performance -----
  train_num_workers: 8
  eval_num_workers: 4
  prefetch_factor: 4
  persistent_workers: false
  pin_memory: false

  # ----- shared dataset params -----
  data_root: /mnt/public/songsiqi/data/lerobot
  include_state: true
  gamma: 1.0
  action_horizon: 10
  normalize_to_minus_one_zero: true
  include_next_obs: false
  action_dim: 32  # X1 uses 32-dim action padding for OpenPI
  robot_type: "turtle2"
  model_type: "pi0"

  # ----- mixture settings -----
  balance_weights: true
  seed: 42

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16  # Reduced due to 3 cameras and larger state
  global_batch_size: 128
  seed: 0

  model:
    precision: bf16
    siglip_path: "/mnt/public/datasets/pretrained-checkpoints/siglip2-so400m-patch14-224"
    gemma3_path: "/mnt/public/datasets/pretrained-checkpoints/gemma-3-270m"
    tokenizer_path: "/mnt/public/datasets/pretrained-checkpoints/gemma-3-270m"
    freeze_vlm: false
    action_dim: 32
    action_horizon: 10
    image_keys: ["base_0_rgb", "left_wrist_0_rgb", "right_wrist_0_rgb"]

  optim:
    lr: 5.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1e-10
    clip_grad: 1.0
    lr_scheduler: "constant"
    lr_warmup_steps: 500
    total_training_steps: 30000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: True  # Enable GC to save memory for 3 cameras
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
