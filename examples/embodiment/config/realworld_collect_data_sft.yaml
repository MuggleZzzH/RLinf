defaults:
  - env/realworld_data_collect_sft@env.eval
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0
      hardware:
        type: Franka
        configs:
          - robot_ip: ROBOT_IP
            node_rank: 0
            # camera_type: "realsense"   # or "zed"
            # camera_serials: ["CAMERA_SERIAL_0"]
            # gripper_type: "franka"     # or "robotiq"
            # gripper_connection: "/dev/ttyUSB0"
            # controller_node_rank: 1

runner:
  task_type: embodied
  logger:
    log_path: null
    project_name: rlinf
    experiment_name: "collect-data-sft"
    logger_backends: ["tensorboard"] # wandb, swanlab
  num_data_episodes: 20
  record_task_description: True

env:
  group_name: "EnvGroup"
  eval:
    ignore_terminations: False
    auto_reset: False
    use_spacemouse: True
    override_cfg:
      task_description: "Describe your task here"
      target_ee_pose: [0.5, 0.0, 0.1, -3.14, 0.0, 0.0]
      success_hold_steps: 1

  data_collection:
    enabled: True
    save_dir: ${runner.logger.log_path}/collected_data
    export_format: "lerobot"      # or "pickle"
    only_success: True
    robot_type: "panda"
    fps: 10
