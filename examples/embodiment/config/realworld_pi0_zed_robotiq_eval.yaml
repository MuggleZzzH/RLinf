defaults:
  - env/realworld_bin_relocation@env.train
  - env/realworld_bin_relocation@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

# ── Two-node rollout-only evaluation ────────────────────────────
#   node 0 (4090 server, 22.04): GPU + 3× ZED cameras
#     → rollout worker + env worker
#   node 1 (NUC, 20.04): Franka arm + Robotiq gripper
#     → FrankaController only
#
# NOTE:
# - This config is intended to be launched by eval_embodied_agent.py, which
#   does not create actor workers.
# - The actor placement/config blocks are intentionally kept as metadata
#   placeholders because current rollout/env code still reads cfg.actor.model
#   and placement world-size information during initialization.
# ─────────────────────────────────────────────────────────────────
cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: franka
      placement: 0
    rollout:
      node_group: franka
      placement: 0
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0
      hardware:
        type: Franka
        configs:
          - robot_ip: 172.16.0.2
            node_rank: 0
            controller_node_rank: 1
            camera_type: "zed"
            camera_serials:
              - "10848563"
              - "39651335"
              - "34303972"
            gripper_type: "robotiq"
            gripper_connection: "/dev/ttyUSB0"
    - label: nuc
      node_ranks: 1
      env_configs:
        - node_ranks: 1
          python_interpreter_path: /home/franka/cynws/RLinf/.venv/bin/python3

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "realworld-pi0-zed-robotiq-eval"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: 1

  only_eval: True
  eval_num_tests: 5
  eval_stop_on_episode_end: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  enable_drq: True

  backup_entropy: False
  critic_subsample_size: 2
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  bootstrap_type: standard
  gamma: 0.96
  tau: 0.01

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -3
    optim:
      lr: 5.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  critic_actor_ratio: 2

  replay_buffer:
    enable_cache: True
    cache_size: 200
    min_buffer_size: 200
    sample_window_size: 200
    auto_save: False

  target_update_freq: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    ignore_terminations: False
    no_gripper: False
    total_num_envs: 1
    keyboard_reward_wrapper: single_stage
    use_spacemouse: False

    max_steps_per_rollout_epoch: 300
    max_episode_steps: 300

    override_cfg:
      target_ee_pose: [0.53, -0.07, 0.2, 3.12, 0.19, 0.24]
      use_dense_reward: False
      is_dummy: false
      max_num_steps: 300
      enable_gripper_penalty: False
      # Match the teleoperation/data-collection action semantics used to create
      # the Pi0 dataset. The policy outputs delta actions in that same scale.
      action_scale: [1.0, 1.0, 1.0]
      # Safety box derived from training data TCP position / orientation range
      # + ~5 cm margin.  Format: [x, y, z, rx, ry, rz] (Euler xyz).
      # Training data absolute ranges:
      #   x ∈ [0.445, 0.599]  y ∈ [−0.170, 0.158]  z ∈ [0.155, 0.328]
      #   |rx| ∈ [2.85, π]    ry ∈ [−0.17, 0.39]    rz ∈ [−0.45, 0.62]
      ee_pose_limit_min: [0.39, -0.22, 0.10, 2.75, -0.28, -0.55]
      ee_pose_limit_max: [0.65, 0.21, 0.38, 3.15, 0.50, 0.73]

    task_description: null

  # Pure-eval runs use env.eval, so keep the realworld task settings here as
  # well instead of relying on env.train overrides.
  eval:
    ignore_terminations: False
    no_gripper: False
    total_num_envs: 1
    keyboard_reward_wrapper: single_stage
    use_spacemouse: False

    max_steps_per_rollout_epoch: 300
    max_episode_steps: 300

    override_cfg:
      target_ee_pose: [0.53, -0.07, 0.2, 3.12, 0.19, 0.24]
      use_dense_reward: False
      is_dummy: false
      max_num_steps: 300
      enable_gripper_penalty: False
      action_scale: [1.0, 1.0, 1.0]
      ee_pose_limit_min: [0.39, -0.22, 0.10, 2.75, -0.28, -0.55]
      ee_pose_limit_max: [0.65, 0.21, 0.38, 3.15, 0.50, 0.73]

    task_description: null

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  log_eval_actions: True
  eval_action_log_every: 1

  sync_weight_nccl_max_ctas: 32

  model:
    model_path: "/path/to/model"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 64
  global_batch_size: 256
  seed: 1234
  enable_offload: True

  model:
    model_path: "/home/user/cyn_ws/RLinf/checkpoints/realworld_pnp/"
    num_action_chunks: 4
    state_dim: 19
    action_dim: 7
    image_num: 2
    # Stage 0 keeps training heads enabled to stay checkpoint-compatible with
    # existing full_weights.pt exports. These can be optimized later.
    add_value_head: True
    add_q_head: True
    q_head_type: "default"

    openpi:
      config_name: "pi0_realworld_pnp"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}

  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 3.5

  critic_optim:
    lr: 3.0e-4
    clip_grad: 10.0
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
