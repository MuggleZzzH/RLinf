# RECAP CFG Evaluation for XSquare X1 (Turtle2) Robot
# This config is used with bash examples/embodiment/run_realworld_eval.sh

defaults:
  - env/realworld_turtle2_deploy@env.train
  - env/realworld_turtle2_deploy@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "gpu"
      placement: 0-0
    rollout:
      node_group: "gpu"
      placement: 0-0
    env:
      node_group: turtle2
      placement: 0
  node_groups:
    - label: "gpu"
      node_ranks: 0-0
      env_configs:
        - node_ranks: 0-0
    - label: turtle2
      node_ranks: 1-1
      hardware:
        type: Turtle2
        configs:
          - node_rank: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "turtle2-recap-cfg-eval"
    logger_backends: ["tensorboard"]
  max_epochs: 1
  max_steps: 1
  only_eval: True
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    override_cfg:
      task_description: "Turtle2 RECAP CFG Evaluation"
  eval:
    total_num_envs: 1
    auto_reset: False
    ignore_terminations: False
    no_gripper: False
    use_spacemouse: False
    use_gello: False
    use_master_takeover: True
    action_mode: absolute_pose
    main_image_key: wrist_2
    max_steps_per_rollout_epoch: 3000
    max_episode_steps: 3000
    data_collection:
      enabled: True
      save_dir: ${oc.env:RLINF_REALWORLD_DATA_DIR,../results/turtle2_recap_eval_rollouts}
      export_format: "pickle"
      only_success: False
      only_intervened: False
      robot_type: "turtle2"
      fps: 60
      finalize_interval: 1
    override_cfg:
      task_description: "Turtle2 RECAP CFG Evaluation"
      use_arm_ids: [0, 1]
      use_camera_ids: [0, 1, 2]
      enforce_gripper_close: false
      pose_control_backend: direct
      step_frequency: 60.0
      direct_publish_hz: 100.0
      reset_command_interval: 0.02
      reset_min_interpolation_steps: 75
      max_num_steps: 3000
      ee_pose_limit_min:
        - [-0.20, -0.60, -0.05, -3.20, -3.20, -3.20]
        - [-0.20, -0.60, -0.05, -3.20, -3.20, -3.20]
      ee_pose_limit_max:
        - [0.80, 0.60, 0.60, 3.20, 3.20, 3.20]
        - [0.80, 0.60, 0.60, 3.20, 3.20, 3.20]

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1
  seed: 1234
  enable_offload: True
  model:
    model_path: ${oc.env:RLINF_RECAP_MODEL_PATH,/path/to/recap/checkpoint}
    model_type: "cfg_model"
    num_action_chunks: 30
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi0_turtle2_x2robot_s2m"
      robot_type: "turtle2"
      num_images_in_input: 3
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}
      cfgrl_guidance_scale: 1.5
      guidance_type: "positive"

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  model:
    model_path: ${actor.model.model_path}
    model_type: ${actor.model.model_type}
    precision: ${actor.model.precision}
