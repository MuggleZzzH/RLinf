env_type: isaaclab
total_num_envs: null
auto_reset: False
ignore_terminations: False
use_rel_reward: True
seed: 0
group_size: 1

reward_coef: 1.0
reward_cfg:
  # Dense reward terms for stack-cube staged progress.
  # Set to False to fallback to sparse success-only reward.
  enable_dense_reward: True
  # If enabled, the next stage only becomes reward-eligible after the previous stage is reached.
  enable_stage_gating: True
  # Failure signal: any cube below this world-z threshold is treated as drop failure.
  drop_height_threshold: -0.05
  rewards:
    grasp_red: 0.10
    stack_red_blue: 0.25
    grasp_green: 0.10
    success: 1.00
    fail_drop: -0.30
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 256
max_episode_steps: 256 # max episode steps for truncation


video_cfg:
  save_video: False
  video_base_dir: ${runner.logger.log_path}/video/train

init_params:
  id: "Isaac-Stack-Cube-Franka-IK-Rel-Visuomotor-v0"
  num_envs: null
  max_episode_steps: ${env.train.max_episode_steps} # max episode steps for truncation
  task_description: "Pick up the red cube and place it on top of the blue cube, then pick up the green cube and place it on top of the red cube."
  table_cam:
    height: 84
    width: 84
  wrist_cam:
    height: 84
    width: 84
