defaults:
  - env/realworld_duck_place_eval@env.train
  - env/realworld_duck_place_eval@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: franka
      placement: 0
    rollout:
      node_group: franka
      placement: 0
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0
      hardware:
        type: Franka
        configs:
          - robot_ip: 172.16.0.2
            node_rank: 0
            controller_node_rank: 1
            camera_type: "zed"
            camera_serials:
              - "10848563"
              - "39651335"
              - "34303972"
            gripper_type: "robotiq"
            gripper_connection: "/dev/ttyUSB0"
    - label: nuc
      node_ranks: 1
      env_configs:
        - node_ranks: 1
          python_interpreter_path: /home/franka/cynws/RLinf/.venv/bin/python3

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "realworld-duck-place-pi0-zed-robotiq-eval"
    logger_backends: ["tensorboard"]
  max_epochs: 1
  max_steps: 1
  only_eval: True
  val_check_interval: -1

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  enable_drq: True
  backup_entropy: False
  critic_subsample_size: 2
  eval_rollout_epoch: 1
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.01
  critic_actor_ratio: 2
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  sync_weight_nccl_max_ctas: 32
  model:
    model_path: "/home/user/cyn_ws/RLinf/checkpoints/realworld_pnp/"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 256
  seed: 1234
  enable_offload: True
  model:
    # Keep a minimal actor-model scaffold because current config validation and
    # worker initialization still read actor.* even in runner.only_eval mode.
    model_path: ${rollout.model.model_path}
    num_action_chunks: 4
    action_dim: 7
    add_value_head: True
    openpi:
      config_name: "pi0_realworld_pnp"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}
