defaults:
  - env/realworld_turtle2_deploy@env.train
  - env/realworld_turtle2_deploy@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "5090"
      placement: 0
    env:
      node_group: turtle2
      placement: 0
    rollout:
      node_group: "5090"
      placement: 0
  node_groups:
    - label: "5090"
      node_ranks: 0
    - label: turtle2
      node_ranks: 1
      hardware:
        type: Turtle2
        configs:
          - node_rank: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "turtle2-fold-towel-deploy-eval"
    logger_backends: ["tensorboard"]
  max_epochs: 1
  max_steps: 1
  only_eval: True
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  rollout_epoch: 1
  eval_rollout_epoch: 1
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  bootstrap_type: always
  gamma: 0.8
  tau: 0.01
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  eval:
    max_steps_per_rollout_epoch: 600
    max_episode_steps: 600
    video_cfg:
      save_video: True
      info_on_video: True
    override_cfg:
      action_mode: absolute_pose
      task_description: "Fold the towel on the table using both arms."
      is_dummy: false
      use_arm_ids: [0, 1]
      use_camera_ids: [0, 1, 2]
      enforce_gripper_close: false
      max_num_steps: 600
      reset_ee_pose:
        - [0.20, 0.00, 0.10, 0.00, 0.00, 0.00]
        - [0.20, 0.00, 0.10, 0.00, 0.00, 0.00]
      ee_pose_limit_min:
        - [-0.20, -0.60, -0.05, -3.20, -3.20, -3.20]
        - [-0.20, -0.60, -0.05, -3.20, -3.20, -3.20]
      ee_pose_limit_max:
        - [0.80, 0.60, 0.60, 3.20, 3.20, 3.20]
        - [0.80, 0.60, 0.60, 3.20, 3.20, 3.20]

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  model:
    model_path: /home/user/zjh_projects/checkpoints/fold_towel_20000_0510_safetensors
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 256
  seed: 1234
  enable_offload: True
  model:
    model_path: ${rollout.model.model_path}
    num_action_chunks: 30
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi0_realworld"
      num_images_in_input: 3
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}
      action_horizon: 30
      action_dim: 32
    openpi_data:
      repo_id: "fold_towel_gqy_0317,fold_towel_gqy_0318"
      default_prompt: "Fold the towel on the table using both arms."

reward:
  use_reward_model: False

critic:
  use_critic_model: False
