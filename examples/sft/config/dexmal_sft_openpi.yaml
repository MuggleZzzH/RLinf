defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-3

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "dexmal_openpi"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 30000
  max_steps: -1
  val_check_interval: -1
  save_interval: 5000

data:
  # Local LeRobot dataset root or a mounted dataset path on the server.
  train_data_paths: "/path/to/dexmal-dataset"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256
  seed: 0

  model:
    precision: null
    model_path: "/path/to/pi0-model"
    num_action_chunks: 50
    action_dim: 14
    add_value_head: True
    openpi:
      config_name: "pi0_dexmal_aloha"
      detach_critic_input: True
      num_images_in_input: 3
      train_expert_only: False
    # Model initialization reads openpi_data from actor.model.
    openpi_data:
      repo_id: ${data.train_data_paths}

  # Dataloader reads openpi_data from actor.
  openpi_data:
    repo_id: ${data.train_data_paths}

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 1.0
    total_training_steps: 30000
    lr_warmup_steps: 1000
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
