defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "turtle2-openpi-s2s-sft"
    logger_backends: ["tensorboard"]
  max_epochs: 30000
  max_steps: -1
  val_check_interval: -1
  save_interval: 5000

data:
  train_data_paths: "/path/to/turtle2-x2robot-s2s-data"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 32
  seed: 0

  model:
    precision: null
    model_path: "/path/to/pi0-model"
    num_action_chunks: 30
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi0_turtle2_x2robot_s2s"
      num_images_in_input: 3
      train_expert_only: False
      detach_critic_input: False

  openpi_data:
    repo_id: "RLinf/Turtle2-X2Robot-S2S"
    action_dim: 14
    use_delta_actions: false
    only_right_obs: false
    random_pos_offset: 0.0

  optim:
    lr: 2.5e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
